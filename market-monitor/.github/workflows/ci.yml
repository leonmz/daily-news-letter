name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Import health check
        run: |
          python -c "from monitor import config, calendar_utils, moving_averages, snapshot, state, alerts, formatter, indicators, email_send, runner"

      - name: Run tests
        run: python -m pytest -v
