name: Deploy to GCP

# Auto-deploy: every push to main runs tests, then builds the image and rolls
# the Cloud Run Job to it. One-time GCP bootstrap: see deploy/gcp_setup.sh.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # required for keyless auth (Workload Identity Federation)

env:
  SERVICE: market-monitor

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: ruff check .
      - run: python -m pytest -q

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Build & push image (Cloud Build → Artifact Registry)
        run: |
          IMAGE="${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT }}/${{ vars.AR_REPO }}/${SERVICE}:${{ github.sha }}"
          gcloud builds submit --tag "$IMAGE" --project "${{ vars.GCP_PROJECT }}"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Roll the Cloud Run Job to the new image
        run: |
          gcloud run jobs update "$SERVICE" \
            --image "$IMAGE" \
            --region "${{ vars.GCP_REGION }}" \
            --project "${{ vars.GCP_PROJECT }}"
