name: Backtest QLD SMA

on:
  workflow_dispatch:
    inputs:
      start:
        description: "Start date"
        default: "2006-06-21"
      end:
        description: "End date"
        default: "2025-12-31"
      periods:
        description: "SMA periods (space-separated)"
        default: "50 100 200"
  push:
    branches:
      - claude/add-moving-average-analysis-LSYkp
    paths:
      - "scripts/backtest_qld_sma.py"
      - "scripts/backtest_qld_qqq_shy_sma.py"
      - "scripts/backtest_apples_to_apples_2x.py"
      - "scripts/backtest_stretch_overlay.py"
      - "newsletter/moving_averages.py"
      - "backtest/**"
      - ".github/workflows/backtest-qld.yml"

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backtest deps
        run: pip install yfinance pandas numpy matplotlib

      - name: Run QLD backtest (with hysteresis 1.04/0.95)
        run: |
          python scripts/backtest_qld_sma.py \
            --start "${{ inputs.start || '2006-06-21' }}" \
            --end "${{ inputs.end || '2025-12-31' }}" \
            --periods ${{ inputs.periods || '50 100 200' }} \
            --plot --output qld_sma_hysteresis.png \
          | tee qld_sma_hysteresis.txt

      - name: Run QLD backtest (pure SMA cross, no hysteresis)
        run: |
          python scripts/backtest_qld_sma.py \
            --start "${{ inputs.start || '2006-06-21' }}" \
            --end "${{ inputs.end || '2025-12-31' }}" \
            --periods ${{ inputs.periods || '50 100 200' }} \
            --no-hysteresis \
            --plot --output qld_sma_pure_cross.png \
          | tee qld_sma_pure_cross.txt

      - name: Run three-tier QLD/QQQ/SHY regime backtest (hysteresis)
        run: |
          python scripts/backtest_qld_qqq_shy_sma.py \
            --plot --output qld_qqq_shy_hysteresis.png \
          | tee qld_qqq_shy_hysteresis.txt

      - name: Run three-tier QLD/QQQ/SHY regime backtest (pure cross)
        run: |
          python scripts/backtest_qld_qqq_shy_sma.py \
            --no-hysteresis \
            --plot --output qld_qqq_shy_pure_cross.png \
          | tee qld_qqq_shy_pure_cross.txt

      - name: Run apples-to-apples 2x QQQ comparison (QLD vs daily-reset vs path-indep)
        run: |
          python scripts/backtest_apples_to_apples_2x.py \
            --plot --output apples_to_apples_2x.png \
          | tee apples_to_apples_2x.txt

      - name: Run stretch-overlay strategy (de-lever when QQQ stretched > X% above SMA200)
        run: |
          python scripts/backtest_stretch_overlay.py \
            --plot --output stretch_overlay.png \
          | tee stretch_overlay.txt

      - name: Run stretch-overlay diagnostic with 180d forward window
        run: |
          python scripts/backtest_stretch_overlay.py \
            --fwd-days 180 \
            --plot --output stretch_overlay_180d.png \
          | tee stretch_overlay_180d.txt

      - name: Run stretch-overlay diagnostic with 360d forward window
        run: |
          python scripts/backtest_stretch_overlay.py \
            --fwd-days 360 \
            --plot --output stretch_overlay_360d.png \
          | tee stretch_overlay_360d.txt

      - name: Smoke test newsletter.moving_averages against live yfinance
        run: |
          python -c "
          from newsletter.moving_averages import fetch_ma_comparisons, format_ma_section, SMA_PERIODS
          comparisons = fetch_ma_comparisons()
          assert comparisons, 'fetch_ma_comparisons returned empty'
          assert len(comparisons) == 2, f'expected 2 tickers, got {len(comparisons)}'
          for c in comparisons:
              assert c.ticker in ('SPY', 'QQQ'), f'unexpected ticker {c.ticker}'
              assert c.price > 0, f'bad price for {c.ticker}: {c.price}'
              assert len(c.levels) == 4, f'{c.ticker} expected 4 levels, got {len(c.levels)}'
              assert [lv.period for lv in c.levels] == SMA_PERIODS
              for lv in c.levels:
                  assert lv.value > 0
                  assert lv.above == (lv.deviation_pct >= 0)
          print()
          print(format_ma_section(comparisons))
          print()
          print('smoke OK')
          " | tee moving_averages_smoke.txt

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: qld-backtest-results
          path: |
            qld_sma_hysteresis.txt
            qld_sma_hysteresis.png
            qld_sma_pure_cross.txt
            qld_sma_pure_cross.png
            qld_qqq_shy_hysteresis.txt
            qld_qqq_shy_hysteresis.png
            qld_qqq_shy_pure_cross.txt
            qld_qqq_shy_pure_cross.png
            apples_to_apples_2x.txt
            apples_to_apples_2x.png
            stretch_overlay.txt
            stretch_overlay.png
            stretch_overlay_180d.txt
            stretch_overlay_180d.png
            stretch_overlay_360d.txt
            stretch_overlay_360d.png
            moving_averages_smoke.txt
          retention-days: 30
