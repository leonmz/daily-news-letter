name: Deploy

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to VM
        run: |
          gcloud compute ssh newsletter-bot \
            --zone=us-central1-a \
            --strict-host-key-checking=no \
            --command="
              set -euo pipefail
              git config --global --add safe.directory /opt/newsletter
              cd /opt/newsletter
              git pull
              sudo docker build -t newsletter-bot .
              sudo docker stop newsletter-bot 2>/dev/null || true
              sudo docker rm newsletter-bot 2>/dev/null || true
              sudo docker run -d \
                --name newsletter-bot \
                --restart unless-stopped \
                --env-file .env \
                --log-opt max-size=10m \
                --log-opt max-file=3 \
                newsletter-bot --bot
              sleep 5
              sudo docker ps --filter name=newsletter-bot
              sudo docker logs --tail=10 newsletter-bot
            "
